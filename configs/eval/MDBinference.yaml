experiment:
  run_name: "inference-MDB-tau-0.8"

shared:
  sample_rate: 24000

model:
  enc_layers: 4
  dec_layers: 4
  d_query: 128
  dropout: 0.1

tokenizer:
  ADTOF_mapping: true
  BOS_token: 2
  EOS_token: 3
  pad_token: 1
  silence_token: 0
  add_velocity: true

EvalDatasetConfig:
  dataset_path: "data/MDB/data@24000/0000.parquet"
  dataset_name: "MDB"
  demucs_separated: false
  splits: [2]


inference:
  checkpoint_path: "checkpoints/setting-tau-0.8"
  batch_size: 16
  max_length: 256
  beam_size: 5
  use_beam_search: false
  instrument: "drums"
  max_samples: 4096
  output_path: "results/MDB-tau-0.8/MDB_inference/2/"

logging:
  log_level: "INFO"
